<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TrendPoster - Legal Documents</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            line-height: 1.6;
            color: #333;
            max-width: 900px;
            margin: 0 auto;
            padding: 20px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
        }
        .container {
            background-color: white;
            padding: 60px 40px;
            border-radius: 12px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
            text-align: center;
        }
        h1 {
            color: #1f6feb;
            font-size: 2.5em;
            margin-bottom: 10px;
        }
        .subtitle {
            color: #666;
            font-size: 1.1em;
            margin-bottom: 40px;
        }
        .links {
            display: flex;
            gap: 20px;
            justify-content: center;
            flex-wrap: wrap;
            margin-top: 30px;
        }
        .link-button {
            display: inline-block;
            padding: 15px 40px;
            background-color: #1f6feb;
            color: white;
            text-decoration: none;
            border-radius: 8px;
            font-size: 1.1em;
            font-weight: 600;
            transition: all 0.3s;
            box-shadow: 0 4px 15px rgba(31, 111, 235, 0.3);
        }
        .link-button:hover {
            background-color: #388bfd;
            box-shadow: 0 6px 20px rgba(31, 111, 235, 0.5);
            transform: translateY(-2px);
        }
        .link-button.secondary {
            background-color: #2da44e;
            box-shadow: 0 4px 15px rgba(45, 164, 78, 0.3);
        }
        .link-button.secondary:hover {
            background-color: #3fb950;
            box-shadow: 0 6px 20px rgba(45, 164, 78, 0.5);
        }
        .footer {
            margin-top: 40px;
            padding-top: 20px;
            border-top: 1px solid #eee;
            color: #666;
            font-size: 0.9em;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🚀 TrendPoster</h1>
        <p class="subtitle">Legal Documents</p>
        
        <p>Welcome to TrendPoster's legal documentation. Please review our important documents below:</p>
        
        <div class="links">
            <a href="Privacy.html" class="link-button">📋 Privacy Policy</a>
            <a href="Terms.html" class="link-button secondary">⚖️ Terms & Conditions</a>
        </div>
        
        <div class="footer">
            <p>Last updated: June 10, 2026</p>
            <p>For questions, contact us at: support@trendposter.app</p>
        </div>
    </div>
</body>
</html>
